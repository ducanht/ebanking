<!-- START: Login Form -->
<div class="container d-flex justify-content-center align-items-center min-vh-80">
    <div class="col-12 col-md-6 col-lg-4">
        <div class="card p-4 p-md-5 border-0 shadow-lg rounded-4 login-card-layout">
            <div class="text-center mb-4">
                <i class='bx bxs-bank text-primary icon-3_5rem'></i>
                <h3 class="fw-bold mt-2 text-dark">Quỹ TDND Yên Thọ</h3>
                <p class="text-secondary small">Hệ thống QL Chỉ tiêu Mở Tài khoản</p>
            </div>
            
            <form id="frm-login">
                <div class="mb-3">
                    <label for="loginEmail" class="form-label fw-semibold text-secondary">Email cán bộ (<span class="text-danger">*</span>)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class='bx bx-envelope text-muted'></i></span>
                        <input type="email" class="form-control border-start-0 ps-0" id="loginEmail" placeholder="abc.nguyen@yentho.com" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="loginPassword" class="form-label fw-semibold text-secondary">Mật khẩu (<span class="text-danger">*</span>)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class='bx bx-lock-alt text-muted'></i></span>
                        <input type="password" class="form-control border-start-0 ps-0" id="loginPassword" placeholder="••••••••" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2 fs-5 d-flex align-items-center justify-content-center gap-2">
                    Đăng Nhập <i class='bx bx-log-in-circle'></i>
                </button>
            </form>
            
            <div class="text-center mt-4 border-top pt-3">
                <p class="text-muted small mb-1">Phiên bản hệ thống: v1.2.9</p>
                <small class="text-muted d-flex align-items-center justify-content-center gap-1">
                    <i class='bx bx-shield-quarter text-success'></i> Dữ liệu được mã hóa đầu cuối.
                </small>
            </div>
        </div>
    </div>
</div>
<!-- END: Login Form -->

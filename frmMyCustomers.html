<!-- frmMyCustomers.html -->
<div class="container py-4 pb-5 mb-5 pb-custom-80">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="mb-0 fw-bold text-primary d-flex align-items-center gap-2">
            <i class='bx bx-book-content'></i> Quản lý Hồ sơ
            <button class="btn btn-outline-primary btn-sm rounded-pill px-3 shadow-sm d-flex align-items-center gap-1" onclick="refreshUserData()" title="Tải lại dữ liệu từ Server">
                <i class='bx bx-refresh fs-5'></i> <span class="d-none d-sm-inline">Làm mới</span>
            </button>
        </h3>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary btn-sm d-none d-sm-flex align-items-center gap-1 shadow-sm" onclick="openChangePasswordModal()">
                <i class='bx bx-lock-open-alt'></i> <span class="d-none d-sm-inline">Đổi Pass</span>
            </button>
            <button class="btn btn-outline-danger btn-sm d-flex align-items-center gap-1 shadow-sm" onclick="logout()">
                <i class='bx bx-log-out'></i> <span class="d-none d-sm-inline">Đăng xuất</span>
            </button>
        </div>
    </div>

    <!-- Widget Xếp hạng và Chiến lược Tìm kiếm Thị phần -->
    <div class="row g-3 mb-4" id="rankingWidget">
        <div class="col-6 col-md-3">
            <div class="glass-card p-3 text-center border-start border-4 border-primary h-100">
                <p class="text-muted mb-1 small text-uppercase fw-semibold">Hạng của Tôi</p>
                <h2 class="fw-bold text-primary mb-0" id="rank-my">…</h2>
                <small class="text-muted" id="rank-total-staffs"></small>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="glass-card p-3 text-center border-start border-4 border-success h-100">
                <p class="text-muted mb-1 small text-uppercase fw-semibold">Cá nhân</p>
                <h2 class="fw-bold text-success mb-0" id="rank-ca-nhan">…</h2>
                <small class="text-muted">hồ sơ</small>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="glass-card p-3 text-center border-start border-4 border-warning h-100">
                <p class="text-muted mb-1 small text-uppercase fw-semibold">Kinh doanh</p>
                <h2 class="fw-bold text-warning mb-0" id="rank-hkd">…</h2>
                <small class="text-muted">hồ sơ</small>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="glass-card p-3 h-100">
                <p class="text-muted mb-2 small text-uppercase fw-semibold"><i class='bx bxs-crown text-warning'></i> Top 1</p>
                <p class="fw-bold mb-1 text-dark font-size-085rem" id="rank-top1-name">…</p>
                <span class="badge bg-warning text-dark rounded-pill" id="rank-top1-total">…</span>
                <hr class="my-2">
                <p class="mb-0 small" id="rank-above-msg"><span class="text-muted">…</span></p>
            </div>
        </div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-12">
            <div class="glass-card p-4 h-100">
                <h6 class="fw-bold mb-3 text-secondary text-uppercase d-flex align-items-center justify-content-between flex-wrap gap-2">
                    <span><i class='bx bx-line-chart text-success'></i> Tiến độ cá nhân (30 ngày)</span>
                    <div class="input-group input-group-sm input-group-date-filter">
                        <span class="input-group-text bg-white border-end-0"><i class='bx bx-calendar-alt text-primary'></i></span>
                        <input type="text" id="filterDateUser" class="form-control border-start-0 ps-0" placeholder="Lọc Lịch sử DataTables">
                    </div>
                </h6>
                <div class="w-100 d-flex justify-content-center align-items-center chart-container-h250">
                    <canvas id="chartTrendUserDay"></canvas>
                </div>
            </div>
        </div>
    </div>
    
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden mb-4">
        <div class="card-body p-0">
            <div class="table-responsive p-3">
                <table id="tblMyCustomers" class="table table-hover align-middle w-100 text-nowrap">
                    <thead class="bg-light text-secondary">
                        <tr>
                            <th>Thời gian</th>
                            <th>Khách hàng</th>
                            <th>Số CCCD</th>
                            <th>Số GPKD</th>
                            <th>Loại HD</th>
                            <th>Trạng thái</th>
                            <th class="text-end">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="tbMyCustomersBody">
                        <!-- JS Render -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal Chi tiết & Sửa Hồ sơ -->
